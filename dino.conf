<VirtualHost 192.168.1.19:80>
	ServerName dino.drealm.info
	ServerAdmin webmaster@drealm.info
	DocumentRoot /var/www/peter
	DirectoryIndex dino.php

	RewriteEngine On
	RewriteCond %{REQUEST_FILENAME} !-d
	RewriteCond %{REQUEST_FILENAME} !-f
	RewriteRule ^(.+)$ dino.php [QSA,L]

	<Directory /var/www/peter>
		AllowOverride All
		Options +MultiViews +FollowSymLinks +Indexes
		AddType application/x-httpd-php .php
	</Directory>
</VirtualHost>
