<VirtualHost 192.168.1.19:80>
	ServerName www.drealm.info
	ServerAdmin webmaster@drealm.info
	DocumentRoot /var/www/drealm-backup

	ServerAlias www.drealm.co.uk
	ServerAlias www.drealm.org

	<Directory /var/www/drealm-backup>
		AllowOverride All
		Options +MultiViews +FollowSymLinks +Indexes
		AddType application/x-httpd-php .php
	</Directory>
</VirtualHost>
