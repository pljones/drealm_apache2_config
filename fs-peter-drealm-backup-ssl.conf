<VirtualHost 192.168.1.19:443>
	LogLevel info ssl:debug

	ServerName www.drealm.info
	ServerAdmin webmaster@drealm.info
	DocumentRoot /var/www/drealm-backup

	#ServerAlias www.drealm.co.uk
	#ServerAlias www.drealm.org

	SSLEngine on
	SSLCertificateFile "/etc/apache2/certs-enabled/drealm.info.pem"
	SSLCertificateKeyFile "/etc/apache2/certs-enabled/drealm.info.key"

	<Directory /var/www/drealm-backup>
		AllowOverride All
		Options +MultiViews +FollowSymLinks +Indexes
		AddType application/x-httpd-php .php
	</Directory>
	<FilesMatch "\.(?:cgi|shtml|phtml|php)$">
		SSLOptions +StdEnvVars
	</FilesMatch>

</VirtualHost>
