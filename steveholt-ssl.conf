<VirtualHost 192.168.1.19:443>
	LogLevel info ssl:debug

	ServerName steveholt.drealm.info
	ServerAdmin webmaster@drealm.info
	DocumentRoot /var/www/drealm-backup/steveholt
	DirectoryIndex sfZed.html

	SSLEngine on
	SSLCertificateFile "/etc/apache2/certs-enabled/drealm.info.pem"
	SSLCertificateKeyFile "/etc/apache2/certs-enabled/drealm.info.key"

	<Directory /var/www/drealm-backup/steveholt>
		AllowOverride All
		Options +MultiViews +FollowSymLinks +Indexes
	</Directory>

</VirtualHost>
