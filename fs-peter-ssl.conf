<IfModule mod_ssl.c>
	<VirtualHost 192.168.1.19:443>
		ServerName peter.drealm.info
		ServerAdmin webmaster@drealm.info
		DocumentRoot /var/www/peter

		ServerAlias jamulus.drealm.info
		ServerAlias rest.drealm.info

		SSLEngine on
		SSLCertificateFile	/etc/ssl/private/ssl-cert-drealm.pem

		<Directory /var/www/peter>
			AllowOverride All
			Options +MultiViews +FollowSymLinks +Indexes
			AddType application/x-httpd-php .php
		</Directory>

	</VirtualHost>
</IfModule>
